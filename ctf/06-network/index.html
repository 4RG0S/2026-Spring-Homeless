<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>공지사항 | 보안동아리</title>
<style>
  body{font-family:Pretendard,system-ui,sans-serif;max-width:640px;margin:0 auto;
       padding:60px 24px;line-height:1.7;color:#222}
  h1{font-size:28px;margin-bottom:8px}
  .sub{color:#888;margin-bottom:36px}
  li{list-style:none;padding:14px 4px;border-bottom:1px solid #EEE;
     display:flex;justify-content:space-between;gap:16px}
  .date{color:#999;font-size:14px;flex:none;font-family:ui-monospace,monospace}
  ul{padding:0}
  a.back{display:inline-block;margin-top:40px;color:#888;font-size:14px}
</style>
</head>
<body>
  <h1>공지사항</h1>
  <p class="sub">서버에서 목록을 받아와 표시합니다.</p>
  <ul id="list"><li>불러오는 중…</li></ul>
  <a class="back" href="../">← 문제 목록으로</a>

<script>
  fetch('notice.json')
    .then(function (r) { return r.json(); })
    .then(function (data) {
      const list = document.getElementById('list');
      list.innerHTML = '';
      // visible이 true인 것만 화면에 그린다
      data.notices.filter(function (n) { return n.visible; })
        .forEach(function (n) {
          const li = document.createElement('li');
          li.innerHTML = '<span>' + n.title + '</span>' +
                         '<span class="date">' + n.date + '</span>';
          list.appendChild(li);
        });
    })
    .catch(function () {
      document.getElementById('list').innerHTML =
        '<li>목록을 불러오지 못했습니다. file:// 로 열면 안 되고 웹서버로 띄워야 합니다.</li>';
    });
</script>
</body>
</html>
