<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>회계 장부 | 임원진 전용</title>
<style>
  body{font-family:Pretendard,system-ui,sans-serif;max-width:640px;margin:0 auto;
       padding:60px 24px;line-height:1.7;color:#222}
  h1{font-size:28px;margin-bottom:8px}
  .sub{color:#888;margin-bottom:36px}
  .panel{border:1px solid #E5E5EA;border-radius:10px;padding:24px;margin-top:24px}
  .deny{background:#FFF0F0;border-color:#F3C9C9}
  .allow{background:#F0FBF4;border-color:#BFE6CE}
  code{background:#FFF;border:1px solid #DDD;padding:3px 8px;border-radius:4px;
       font-family:ui-monospace,monospace;font-size:15px}
  .role{font-family:ui-monospace,monospace;font-size:13px;color:#888;margin-top:20px}
  a.back{display:inline-block;margin-top:40px;color:#888;font-size:14px}
</style>
</head>
<body>
  <h1>동아리 회계 장부</h1>
  <p class="sub">임원진만 열람할 수 있습니다.</p>

  <div id="out"></div>
  <p class="role">현재 세션 권한: <span id="who">…</span></p>
  <a class="back" href="../">← 문제 목록으로</a>

<script>
  // 쿠키가 없으면 일반 부원 권한으로 발급
  function getCookie(name) {
    const m = document.cookie.match('(^|; )' + name + '=([^;]*)');
    return m ? decodeURIComponent(m[2]) : null;
  }

  let role = getCookie('role');
  if (!role) {
    document.cookie = 'role=member; path=/';
    role = 'member';
  }

  document.getElementById('who').textContent = role;

  const out = document.getElementById('out');
  if (role === 'admin') {
    out.innerHTML =
      '<div class="panel allow">' +
      '<strong>열람 승인됨</strong>' +
      '<p>2026년 1학기 결산: 회비 수입 1,240,000원 / 지출 1,187,500원</p>' +
      '<p>플래그: <code>FLAG{c00k13_m0nst3r_g0t_4dm1n}</code></p>' +
      '<p style="font-size:14px;color:#666;margin-top:14px">' +
      '이 서버는 당신이 관리자인지 <em>당신에게</em> 물어봤고, 당신 대답을 그대로 믿었습니다. ' +
      '이게 실제 서비스에서 터지면 취약점 이름이 붙습니다. Broken Access Control.</p>' +
      '</div>';
  } else {
    out.innerHTML =
      '<div class="panel deny">' +
      '<strong>접근 거부</strong>' +
      '<p>이 페이지는 <code>role=admin</code> 권한이 필요합니다. ' +
      '현재 권한으로는 열람할 수 없습니다.</p>' +
      '</div>';
  }
</script>
</body>
</html>
